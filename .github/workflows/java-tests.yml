name: Java CI Tests

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Compile Java files (includes Gson + other libs)
      - name: Compile source code
        run: |
          mkdir -p out
          javac -cp "lib/*" -d out $(find src -name "*.java")

      # 4. Run JUnit tests (standalone console launcher)
      - name: Run JUnit tests
        run: |
          java -jar lib/junit-platform-console-standalone.jar \
          --class-path out \
          --scan-class-path
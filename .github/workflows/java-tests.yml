name: Java Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Java files
        run: |
          mkdir out
          javac -cp "lib/*" -d out $(find src -name "*.java")

      - name: Run tests
        run: |
          java -jar lib/junit.jar \
          --class-path out \
          --scan-class-path